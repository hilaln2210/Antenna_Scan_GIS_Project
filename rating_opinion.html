<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating and Opinion – Antenna Scan</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #b3d9f7 0%, #e0f0ff 100%);
            font-family: Arial, sans-serif; margin: 0; padding: 20px;
            min-height: 100vh;
        }
        .page-wrap { max-width: 640px; margin: 0 auto; }
        .card {
            background: white; border-radius: 12px;
            padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .logo { max-width: 140px; display: block; margin: 0 auto 16px; }
        h2 { text-align: center; margin-bottom: 6px; color: #1a1a2e; }
        .slogan { text-align: center; font-style: italic; color: #777; margin-bottom: 24px; font-size: 14px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #333; }
        select, textarea, input[type="text"] {
            width: 100%; padding: 10px; margin-bottom: 16px;
            border: 1px solid #ccc; border-radius: 6px; font-size: 15px;
        }
        select:focus, textarea:focus, input:focus {
            outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
        }
        /* Star rating */
        .stars-wrap { display: flex; gap: 8px; margin-bottom: 16px; }
        .star {
            font-size: 32px; cursor: pointer; transition: transform 0.1s;
            color: #ddd; user-select: none;
        }
        .star.active { color: #f9a825; }
        .star:hover { transform: scale(1.2); }
        #rating-label { font-size: 13px; color: #777; margin-left: 8px; }
        /* Submit */
        button[type="submit"] {
            width: 100%; padding: 12px; background: #1a73e8; color: white;
            border: none; border-radius: 6px; font-size: 16px; cursor: pointer;
            transition: background 0.2s;
        }
        button[type="submit"]:hover { background: #1558b0; }
        /* Thank you */
        #thankYouMessage {
            display: none; text-align: center; padding: 20px;
        }
        #thankYouMessage .check { font-size: 48px; }
        #thankYouMessage h3 { color: #2e7d32; margin: 8px 0 4px; }
        #thankYouMessage p { color: #555; font-size: 14px; }
        #submit-another { margin-top: 12px; background: #43a047; color: white;
            border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }

        /* Past reviews */
        .reviews-title { font-size: 14px; font-weight: bold; color: #555;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .review-item {
            background: #f8f9fa; border-radius: 8px; padding: 12px;
            margin-bottom: 10px; border-left: 4px solid #1a73e8;
        }
        .review-meta { font-size: 12px; color: #888; margin-bottom: 4px; }
        .review-stars { color: #f9a825; font-size: 14px; }
        .review-text { font-size: 14px; color: #333; margin-top: 4px; }
        .no-reviews { color: #aaa; font-size: 14px; text-align: center; padding: 12px; }

        /* Nav */
        nav { text-align: center; margin-top: 16px; }
        nav a {
            color: #1a73e8; text-decoration: none; margin: 0 10px;
            font-size: 14px; font-weight: bold;
        }
        nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="card">
        <img src="logo.jpg" alt="Antenna Scan Logo" class="logo">
        <h2>Rating and Opinion</h2>
        <p class="slogan">Share your cellular reception experience so others can make better choices.</p>

        <form id="feedbackForm">
            <label for="company">Mobile Company:</label>
            <select id="company" name="company">
                <option value="Cellcom">Cellcom (סלקום)</option>
                <option value="Pelephone">Pelephone (פלאפון)</option>
                <option value="Partner">Partner (פרטנר)</option>
                <option value="Hot Mobile">Hot Mobile</option>
                <option value="PHI">PHI (Hot & Partner)</option>
            </select>

            <label for="location">Location / City:</label>
            <input type="text" id="location" name="location" placeholder="e.g. Tel Aviv, Haifa…">

            <label>Rating:</label>
            <div class="stars-wrap" id="stars-wrap">
                <span class="star" data-val="1">★</span>
                <span class="star" data-val="2">★</span>
                <span class="star" data-val="3">★</span>
                <span class="star" data-val="4">★</span>
                <span class="star" data-val="5">★</span>
                <span id="rating-label">Click to rate</span>
            </div>
            <input type="hidden" id="rating" value="0">

            <label for="opinion">Your Opinion:</label>
            <textarea id="opinion" name="opinion" rows="4" placeholder="Describe the signal quality, coverage issues, speed…"></textarea>

            <button type="submit">Submit Review</button>
        </form>

        <div id="thankYouMessage">
            <div class="check">✅</div>
            <h3>Thank you for your feedback!</h3>
            <p>Your review helps other users improve their cellular experience.</p>
            <button id="submit-another">Submit Another</button>
        </div>
    </div>

    <!-- Past reviews -->
    <div class="card" id="reviews-card">
        <div class="reviews-title">Recent Community Reviews</div>
        <div id="reviews-list"></div>
    </div>

    <nav>
        <a href="Home.html">Home</a>
        <a href="map.html">Map</a>
        <a href="login.html">Login</a>
        <a href="Register.html">Register</a>
    </nav>
</div>

<script>
// ── Star rating ────────────────────────────────────────────────────────────────
let selectedRating = 0;
const stars = document.querySelectorAll('.star');
const ratingLabels = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];

stars.forEach(star => {
    star.addEventListener('mouseenter', () => highlightStars(+star.dataset.val));
    star.addEventListener('mouseleave', () => highlightStars(selectedRating));
    star.addEventListener('click', () => {
        selectedRating = +star.dataset.val;
        document.getElementById('rating').value = selectedRating;
        document.getElementById('rating-label').textContent = ratingLabels[selectedRating];
        highlightStars(selectedRating);
    });
});

function highlightStars(val) {
    stars.forEach(s => s.classList.toggle('active', +s.dataset.val <= val));
}

// ── LocalStorage reviews ───────────────────────────────────────────────────────
function loadReviews() {
    return JSON.parse(localStorage.getItem('antenna_reviews') || '[]');
}
function saveReview(review) {
    const reviews = loadReviews();
    reviews.unshift(review);
    localStorage.setItem('antenna_reviews', JSON.stringify(reviews.slice(0, 50)));
}
function renderReviews() {
    const reviews = loadReviews();
    const el = document.getElementById('reviews-list');
    if (!reviews.length) {
        el.innerHTML = '<div class="no-reviews">No reviews yet. Be the first!</div>';
        return;
    }
    el.innerHTML = reviews.slice(0, 10).map(r => `
        <div class="review-item">
            <div class="review-meta">
                <b>${r.company}</b> · ${r.location || 'Unknown location'} ·
                <span style="color:#aaa">${r.date}</span>
            </div>
            <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
            <div class="review-text">${r.opinion || '<em>No comment</em>'}</div>
        </div>
    `).join('');
}

// ── Form submit ────────────────────────────────────────────────────────────────
document.getElementById('feedbackForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (selectedRating === 0) {
        alert('Please select a star rating.');
        return;
    }
    saveReview({
        company:  document.getElementById('company').value,
        location: document.getElementById('location').value,
        rating:   selectedRating,
        opinion:  document.getElementById('opinion').value,
        date:     new Date().toLocaleDateString('en-GB')
    });
    document.getElementById('feedbackForm').style.display = 'none';
    document.getElementById('thankYouMessage').style.display = 'block';
    renderReviews();
});

document.getElementById('submit-another').addEventListener('click', () => {
    document.getElementById('feedbackForm').reset();
    document.getElementById('feedbackForm').style.display = 'block';
    document.getElementById('thankYouMessage').style.display = 'none';
    selectedRating = 0;
    document.getElementById('rating').value = 0;
    document.getElementById('rating-label').textContent = 'Click to rate';
    highlightStars(0);
});

renderReviews();
</script>
</body>
</html>
